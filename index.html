<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Run Me an Errand — Coming Soon</title>

  <!-- FIX 3: preload + display=swap for font performance / no FOIT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon:      #6B0F1A;
      --maroon-deep: #420A10;
      --maroon-mid:  #8C1C28;
      --gold:        #C9A84C;
      --gold-dim:    #8a6e2f;
      --white:       #F5F0E8;
      --white-dim:   rgba(245,240,232,0.45);
      --line:        rgba(201,168,76,0.2);
    }

    html {
      height: 100%;
    }

    /* FIX 1: Replace overflow:hidden — allow vertical scroll on small screens */
    body {
      min-height: 100%;
      background: var(--maroon-deep);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ── GRAIN ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.055;
      pointer-events: none;
      z-index: 999;
    }

    /* ── GRID ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* ── GLOWS ── */
    .glow {
      position: fixed;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,28,40,0.55) 0%, transparent 68%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: breathe 7s ease-in-out infinite;
      pointer-events: none;
    }

    .glow-gold {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      z-index: 0;
      animation: breathe 9s ease-in-out infinite reverse;
      pointer-events: none;
    }

    @keyframes breathe {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.8; }
      50%      { transform: translate(-50%,-50%) scale(1.1); opacity: 1;   }
    }

    /* ── LAYOUT ── */
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 2.5rem 3rem;
      padding-bottom: 5rem; /* ticker clearance */
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 2vw, 1.6rem);
      letter-spacing: 0.14em;
      color: var(--gold);
    }

    /* FIX 5 (live toggle): status pill becomes reactive */
    .status-pill {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      padding: 0.35rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(201,168,76,0.06);
      transition: background 0.4s, color 0.4s, border-color 0.4s;
    }

    .status-pill.is-live {
      color: #4ade80;
      border-color: #166534;
      background: rgba(74,222,128,0.08);
    }

    .status-pill.is-live .dot {
      background: #4ade80;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 1.4s step-start infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── CENTER ── */
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 0;
    }

    /* FIX messaging: singular signal */
    .eyebrow {
      font-size: 0.63rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 11vw, 10.5rem);
      line-height: 0.88;
      letter-spacing: 0.01em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 0.9s 0.4s forwards;
    }

    .headline .ghost {
      display: block;
      -webkit-text-stroke: 1.5px rgba(245,240,232,0.28);
      color: transparent;
    }

    .headline .accent {
      color: var(--gold);
    }

    .sub {
      margin-top: 1.8rem;
      font-size: clamp(0.7rem, 1.1vw, 0.85rem);
      color: var(--white-dim);
      line-height: 1.8;
      max-width: 42ch;
      opacity: 0;
      animation: fadeUp 0.9s 0.6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.8s forwards;
    }

    .launch-label {
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-bottom: 0.4rem;
    }

    .launch-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    /* ── COUNTDOWN ── */
    .countdown-bar { display: flex; flex-wrap: wrap; }

    .unit {
      padding: 1rem 1.8rem;
      border: 1px solid var(--line);
      border-right: none;
      position: relative;
      background: rgba(66,10,16,0.6);
      backdrop-filter: blur(4px);
      text-align: center;
      transition: background 0.25s;
    }
    .unit:last-child { border-right: 1px solid var(--line); }
    .unit:hover { background: rgba(107,15,26,0.75); }

    .unit::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    .unit:hover::after { transform: scaleX(1); }

    .unit-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4.5vw, 4rem);
      line-height: 1;
      color: var(--white);
      display: block;
    }

    .unit-label {
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      display: block;
      margin-top: 0.3rem;
    }

    /* live message replaces countdown */
    .live-message {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.12em;
      color: var(--gold);
      align-self: center;
    }

    /* ── VERTICAL RULE ── */
    .v-rule {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--line) 30%, var(--line) 70%, transparent);
      right: 3rem;
      z-index: 0;
      pointer-events: none;
    }

    /* ── SCANLINE ── */
    .progress-line {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--maroon-mid), var(--gold), transparent);
      z-index: 100;
      animation: scanline 3.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes scanline {
      0%   { width: 0%;   opacity: 1; }
      75%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    /* ── TICKER ──
       FIX 4: content written once in JS, duplicated programmatically */
    .ticker-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2.2rem;
      overflow: hidden;
      background: var(--gold);
      z-index: 10;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: flex;
      white-space: nowrap;
      /* animation duration set by JS based on content width */
    }

    .ticker-track span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.22em;
      color: var(--maroon-deep);
      padding: 0 3rem;
    }

    .ticker-track span::after {
      content: '◆';
      margin-left: 3rem;
      opacity: 0.45;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 640px) {
      .stage {
        padding: 1.8rem 1.5rem;
        padding-bottom: 5rem;
      }

      .v-rule { display: none; }

      footer {
        flex-direction: column;
        align-items: flex-start;
      }

      .unit {
        padding: 0.8rem 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div class="progress-line"></div>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="glow-gold"></div>
  <div class="v-rule"></div>

  <!-- TICKER — content injected by JS -->
  <div class="ticker-wrap" role="marquee" aria-label="Site status ticker">
    <div class="ticker-track" id="ticker-track"></div>
  </div>

  <div class="stage">
    <header>
      <div class="logo">Run Me an Errand</div>
      <!-- FIX 5: pill label updated by JS on launch -->
      <div class="status-pill" id="status-pill">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">System Upgrade</span>
      </div>
    </header>

    <div class="center">
      <!-- FIX messaging: single signal -->
      <div class="eyebrow">System Upgrade in Progress</div>
      <div class="headline">
        We're<br>
        <span class="ghost">Levelling</span>
        <span class="accent">Up.</span>
      </div>
      <p class="sub">
        Final system checks underway. Relaunching Wednesday — faster, cleaner, and fully upgraded across Kenya.
      </p>
    </div>

    <footer>
      <div>
        <div class="launch-label">Going live</div>
        <div class="launch-date">Wednesday, 29 Apr 2026</div>
      </div>

      <!-- FIX 5: aria-live for screen readers -->
      <div class="countdown-bar" id="countdown" aria-live="polite" aria-label="Countdown to launch">
        <div class="unit">
          <span class="unit-num" id="days">00</span>
          <span class="unit-label">Days</span>
        </div>
        <div class="unit">
          <span class="unit-num" id="hours">00</span>
          <span class="unit-label">Hrs</span>
        </div>
        <div class="unit">
          <span class="unit-num" id="minutes">00</span>
          <span class="unit-label">Min</span>
        </div>
        <div class="unit">
          <span class="unit-num" id="seconds">00</span>
          <span class="unit-label">Sec</span>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // FIX 2: Lock to EAT (UTC+3) — 09:00 Nairobi = 06:00 UTC
    const launchDate = new Date("2026-04-29T06:00:00Z").getTime();

    const pad = n => String(Math.max(0, n)).padStart(2, '0');

    // FIX 4: Build ticker programmatically — write once, duplicate via JS
    const tickerItems = [
      "UPGRADE IN PROGRESS",
      "KENYA'S ERRAND NETWORK",
      "BACK WEDNESDAY 29 APR",
      "SOMETHING BETTER IS COMING",
      "RUN ME AN ERRAND",
      "NATIONWIDE SERVICE"
    ];

    const track = document.getElementById("ticker-track");
    // Write twice for seamless loop
    [1, 2].forEach(() => {
      tickerItems.forEach(item => {
        const span = document.createElement("span");
        span.textContent = item;
        track.appendChild(span);
      });
    });

    // Animate based on actual content width
    const totalWidth = track.scrollWidth / 2;
    const speed = 40; // px per second
    const duration = totalWidth / speed;
    track.style.animation = `ticker ${duration}s linear infinite`;

    // Countdown + live switch
    const goLive = () => {
      // Swap countdown for live message
      document.getElementById("countdown").innerHTML =
        "<div class='live-message'>We Are Live</div>";

      // FIX 5: Switch status pill to Live
      const pill = document.getElementById("status-pill");
      pill.classList.add("is-live");
      document.getElementById("status-text").textContent = "Live";
      document.getElementById("status-dot").style.animation = "none";
      document.getElementById("status-dot").style.opacity = "1";
    };

    const tick = () => {
      const gap = launchDate - Date.now();

      if (gap <= 0) {
        goLive();
        return;
      }

      const s = 1000, m = s * 60, h = m * 60, d = h * 24;
      document.getElementById("days").textContent    = pad(Math.floor(gap / d));
      document.getElementById("hours").textContent   = pad(Math.floor((gap % d) / h));
      document.getElementById("minutes").textContent = pad(Math.floor((gap % h) / m));
      document.getElementById("seconds").textContent = pad(Math.floor((gap % m) / s));
    };

    tick();
    setInterval(tick, 1000);
  </script>
</body>
                                       </html>
