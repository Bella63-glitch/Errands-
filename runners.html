<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner HQ | Resting</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #7B1E3A;
            --gold: #FFD700;
            --cream: #FAF9F6;
        }

        body {
            margin: 0;
            background: var(--cream);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .content {
            text-align: center;
            padding: 20px;
        }

        /* The "Shoe" Animation - Minimalist & Cool */
        .loader {
            position: relative;
            width: 100px;
            height: 50px;
            margin: 0 auto 40px;
        }

        .circle {
            width: 15px;
            height: 15px;
            background: var(--maroon);
            border-radius: 50%;
            position: absolute;
            animation: bounce 0.8s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5);
        }

        .circle:nth-child(2) { left: 40px; animation-delay: 0.2s; background: var(--gold); }
        .circle:nth-child(3) { left: 80px; animation-delay: 0.4s; }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(30px); }
        }

        h1 {
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin: 0;
            color: var(--maroon);
        }

        p {
            font-size: 1rem;
            color: #666;
            margin: 15px 0 40px;
            font-weight: 400;
            max-width: 300px;
            line-height: 1.5;
        }

        .btn {
            padding: 18px 40px;
            border-radius: 50px;
            background: #fff;
            border: 2px solid var(--maroon);
            color: var(--maroon);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--maroon);
            color: #fff;
        }

        .footer-text {
            position: absolute;
            bottom: 40px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="loader">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <h1>RUNNER HQ</h1>
        <p>Our directory is catching its breath. We’ll be back in the race shortly.</p>

        <a href="login.html" class="btn">ADMIN LOGIN</a>
    </div>

    <div class="footer-text">ESTIMATED RECOVERY: 45 MINS</div>

</body>
</html>
